{% extends 'shop/base.html' %}

{% block title %}Каталог товаров{% endblock %}

{% block content %}
<h2>Каталог товаров</h2>

<form id="filter-form" method="get">
    <label for="category">Категория:</label>
    <select name="category" id="category">
        <option value="">Все категории</option>
        {% for category in categories %}
            <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>
                {{ category }}
            </option>
        {% endfor %}
    </select>

    <label for="min_price">Мин. цена:</label>
    <input type="number" name="min_price" id="min_price" value="{{ min_price }}">

    <label for="max_price">Макс. цена:</label>
    <input type="number" name="max_price" id="max_price" value="{{ max_price }}">

    <label for="date_filter">Дата добавления:</label>
    <select name="date_filter" id="date_filter">
        <option value="">За всё время</option>
        <option value="7" {% if selected_date_filter == '7' %}selected{% endif %}>За последние 7 дней</option>
        <option value="30" {% if selected_date_filter == '30' %}selected{% endif %}>За последние 30 дней</option>
        <option value="90" {% if selected_date_filter == '90' %}selected{% endif %}>За последние 90 дней</option>
    </select>

    <label for="sort">Сортировка:</label>
    <select name="sort" id="sort">
        <option value="popular" {% if selected_sort == 'popular' %}selected{% endif %}>По популярности</option>
        <option value="price_asc" {% if selected_sort == 'price_asc' %}selected{% endif %}>Цена: по возрастанию</option>
        <option value="price_desc" {% if selected_sort == 'price_desc' %}selected{% endif %}>Цена: по убыванию</option>
        <option value="date_asc" {% if selected_sort == 'date_asc' %}selected{% endif %}>Дата: сначала старые</option>
        <option value="date_desc" {% if selected_sort == 'date_desc' %}selected{% endif %}>Дата: сначала новые</option>
    </select>

    <button type="submit">Применить</button>
</form>

<hr>

<div id="product-list">
    {% include 'shop/product_list_partial.html' %}
</div>

<script>
document.getElementById('filter-form').addEventListener('submit', function(event) {
    event.preventDefault();

    const formData = new FormData(this);
    const queryString = new URLSearchParams(formData).toString();

    fetch(`/shop/ajax-product-list/?${queryString}`)
        .then(response => response.json())
        .then(data => {
            const productList = document.getElementById('product-list');
            let html = '';

            if (data.products.length === 0) {
                html += '<p>Товары не найдены.</p>';
            } else {
                html += '<ul>';
                data.products.forEach(product => {
                    html += `
                        <li>
                            <strong>${product.name}</strong><br>
                            Категория: ${product.category}<br>
                            Цена: ${product.price} руб.<br>
                            Дата добавления: ${product.created_at}<br>
                            Популярность: ${product.order_count}
                        </li>
                    `;
                });
                html += '</ul>';
            }

            html += '<div class="pagination">';
            if (data.has_previous) {
                html += `<button onclick="loadPage(${data.current_page - 1})">« Предыдущая</button>`;
            }

            html += `<span> Страница ${data.current_page} из ${data.num_pages} </span>`;

            if (data.has_next) {
                html += `<button onclick="loadPage(${data.current_page + 1})">Следующая »</button>`;
            }
            html += '</div>';

            productList.innerHTML = html;
        });
});

function loadPage(page) {
    const form = document.getElementById('filter-form');
    const formData = new FormData(form);
    formData.set('page', page);

    const queryString = new URLSearchParams(formData).toString();

    fetch(`/shop/ajax-product-list/?${queryString}`)
        .then(response => response.json())
        .then(data => {
            const productList = document.getElementById('product-list');
            let html = '';

            if (data.products.length === 0) {
                html += '<p>Товары не найдены.</p>';
            } else {
                html += '<ul>';
                data.products.forEach(product => {
                    html += `
                        <li>
                            <strong>${product.name}</strong><br>
                            Категория: ${product.category}<br>
                            Цена: ${product.price} руб.<br>
                            Дата добавления: ${product.created_at}<br>
                            Популярность: ${product.order_count}
                        </li>
                    `;
                });
                html += '</ul>';
            }

            html += '<div class="pagination">';
            if (data.has_previous) {
                html += `<button onclick="loadPage(${data.current_page - 1})">« Предыдущая</button>`;
            }

            html += `<span> Страница ${data.current_page} из ${data.num_pages} </span>`;

            if (data.has_next) {
                html += `<button onclick="loadPage(${data.current_page + 1})">Следующая »</button>`;
            }
            html += '</div>';

            productList.innerHTML = html;
        });
}
</script>
{% endblock %}
